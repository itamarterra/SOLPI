services:
  # ─── Hermes Agent ────────────────────────────────────────
  hermes-agent:
    build:
      context: ./research/hermes-agent/hermes-agent-main
      dockerfile: Dockerfile
    container_name: solpi-hermes-agent
    restart: unless-stopped
    ports:
      - "8001:8001"  # Dashboard/UI
      - "8002:8002"  # Gateway API
      - "8003:8003"  # Internal services
    environment:
      - HERMES_ENV=development
      - HERMES_LOG_LEVEL=info
      - HERMES_UI_PORT=8001
      - HERMES_GATEWAY_PORT=8002
      - NODE_ENV=production
    volumes:
      - hermes_data:/opt/data
      - hermes_cache:/root/.cache
      - ./research/hermes-agent/hermes-agent-main:/opt/hermes:ro
    networks:
      - solpi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - redis
    labels:
      - "service=hermes-agent"
      - "project=solpi"

  # ─── OpenClaude CLI ──────────────────────────────────────
  openclaude:
    build:
      context: ./research/openclaude/openclaude-main
      dockerfile: Dockerfile
    container_name: solpi-openclaude
    restart: unless-stopped
    ports:
      - "8004:3000"  # CLI server (if applicable)
    environment:
      - NODE_ENV=production
      - CLAUDE_LOG_LEVEL=info
    volumes:
      - openclaude_cache:/root/.cache
      - openclaude_config:/root/.config/openclaude
      - ./research/openclaude/openclaude-main:/app:ro
    networks:
      - solpi-network
    entrypoint: ["node", "/app/bin/openclaude"]
    command: ["--help"]
    stdin_open: true
    tty: true
    labels:
      - "service=openclaude"
      - "project=solpi"

  # ─── OpenClaw Gateway ────────────────────────────────────
  openclaw:
    build:
      context: ./research/openclaw/openclaw-mine-main
      dockerfile: Dockerfile
      args:
        OPENCLAW_EXTENSIONS: ""
        OPENCLAW_INSTALL_BROWSER: ""
        OPENCLAW_INSTALL_DOCKER_CLI: ""
    container_name: solpi-openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"  # Gateway API
    environment:
      - NODE_ENV=production
      - OPENCLAW_LOG_LEVEL=info
      - OPENCLAW_BIND=0.0.0.0  # Accessible from host
      - OPENCLAW_PORT=18789
    volumes:
      - openclaw_workspace:/home/node/.openclaw/workspace
      - openclaw_config:/home/node/.config/openclaw
      - openclaw_cache:/home/node/.cache/ms-playwright
      - ./research/openclaw/openclaw-mine-main:/app:ro
    networks:
      - solpi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    user: node
    labels:
      - "service=openclaw"
      - "project=solpi"

  # ─── Redis (Shared cache/session store) ───────────────────
  redis:
    image: redis:7-alpine
    container_name: solpi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - solpi-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "service=redis"
      - "project=solpi"

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: solpi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - solpi-network
    depends_on:
      - hermes-agent
      - openclaw
    labels:
      - "service=nginx"
      - "project=solpi"

networks:
  solpi-network:
    driver: bridge
    name: solpi-network

volumes:
  hermes_data:
    name: solpi-hermes-data
  hermes_cache:
    name: solpi-hermes-cache
  openclaude_cache:
    name: solpi-openclaude-cache
  openclaude_config:
    name: solpi-openclaude-config
  openclaw_workspace:
    name: solpi-openclaw-workspace
  openclaw_config:
    name: solpi-openclaw-config
  openclaw_cache:
    name: solpi-openclaw-cache
  redis_data:
    name: solpi-redis-data
