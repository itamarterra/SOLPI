services:

  glpi-db:
    image: mariadb:10.11
    container_name: glpi-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: glpi_root
      MARIADB_DATABASE: glpi
      MARIADB_USER: glpi
      MARIADB_PASSWORD: glpi
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - glpi_db_data:/var/lib/mysql

  glpi-init:
    image: busybox:latest
    container_name: glpi-init
    restart: "no"
    command: sh -c "chown -R 33:33 /var/glpi/files /var/glpi/marketplace /var/glpi/config"
    volumes:
      - glpi_files:/var/glpi/files
      - glpi_marketplace:/var/glpi/marketplace
      - glpi_config:/var/glpi/config

  glpi:
    image: glpi/glpi:latest
    container_name: glpi
    restart: always
    depends_on:
      glpi-db:
        condition: service_started
      glpi-init:
        condition: service_completed_successfully
    ports:
      - "8081:80"
    environment:
      GLPI_DB_HOST: glpi-db
      GLPI_DB_PORT: 3306
      GLPI_DB_NAME: glpi
      GLPI_DB_USER: glpi
      GLPI_DB_PASSWORD: glpi
    volumes:
      - glpi_files:/var/glpi/files
      - glpi_marketplace:/var/glpi/marketplace
      - glpi_config:/var/glpi/config
      - ./plugins/solpi:/var/www/glpi/plugins/solpi
      - ./plugins/solpi/webhook.php:/var/www/glpi/public/solpi-webhook.php
      - ./plugins/solpi/test_public.php:/var/www/glpi/public/solpi-test.php
      - ./plugins/solpi/import_public.php:/var/www/glpi/public/solpi-import.php
      - ./plugins/solpi/public:/var/www/glpi/public/solpi

  postgres:
    image: postgres:16
    container_name: evolution-postgres
    restart: always
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution123
    ports:
      - "5432:5432"
    volumes:
      - evolution_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - evolution_redis:/data

  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    restart: always

    depends_on:
      - postgres
      - redis

    ports:
      - "8088:8080"

    environment:

      SERVER_TYPE: http
      SERVER_PORT: 8080

      AUTHENTICATION_API_KEY: solpi123

      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution123@postgres:5432/evolution

      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379

      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379

      CONFIG_SESSION_PHONE_CLIENT: Evolution
      CONFIG_SESSION_PHONE_NAME: SOLPI

      CONFIG_SESSION_PHONE_VERSION: 2.3000.1025062854

      LOG_LEVEL: ERROR

      DEL_INSTANCE: "false"

    volumes:
      - evolution_instances:/evolution/instances

volumes:
  glpi_db_data:
  glpi_files:
  glpi_marketplace:
  glpi_config:
  evolution_postgres:
  evolution_redis:
  evolution_instances: